version: '3.8'\n\nservices:\n  db:\n    image: postgres:latest\n    environment:\n      POSTGRES_DB: ticket_db\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n    ports:\n      - "5432:5432"\n    volumes:\n      - db_data:/var/lib/postgresql/data\n\n  backend:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    environment:\n      DATABASE_URL: postgres://user:password@db:5432/ticket_db\n    ports:\n      - "8000:8000"\n    depends_on:\n      - db\n\nvolumes:\n  db_data: